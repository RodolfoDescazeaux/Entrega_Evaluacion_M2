<!DOCTYPE html>

<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Contacto</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>
    <!--Formulario-->
    <div class="formulario">
        <form action="envio_formulario.html" class="row g-3">
            <div class="col-md-12 fondo">
                <h2>Contáctame</h2>
            </div>
            <div class="col-md-12 fondo">
                <label for="inputName" class="form-label">Nombre</label>
                <input type="text" class="form-control" id="inputName" required>
                <br>
            </div>
            <div class="col-md-12 fondo">
                <label for="inputEmail4" class="form-label">Correo electrónico</label>
                <input type="email" class="form-control" id="inputEmail4" required>
                <br>
            </div>
            <div class="col-md-12 fondo">
                <label for="inputReason" class="form-label">Motivo</label>
                <textarea type="text" class="form-control" id="inputReason"></textarea>
                <br>
            </div>
            <div class="col-12">
                <button type="submit" class="btn btn-dark">Enviar</button>
            </div>
        </form>
    </div>
    <!--Fin Formulario-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

</body>

</html>
